- name: Configuration of redis Server
  hosts: redis
  become: yes
  tasks: 
  - name: enable redis 7
    command: dnf module enable redis:7 -y
  
  - name: Install package
    package: 
      name: redis
      state: present

  - name: Allow remote connections
    replace:
      path: /etc/redis/redis.conf
      regexp: '127.0.0.1'
      replace: '0.0.0.0'

  - name : Change protedted module
    lineinfile:
      path: /etc/redis/redis.conf
      regexp: 'protected-mode'
      line: 'protected-mode no'

  - name: Start and enable redis
    service:
      name: redis
      state: started
      enabled: yes
